<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">DE-pipeline AI 챗봇 구조</title>
  <desc id="desc">사용자 질문이 Query Router, LLM Analysis, RAG, Parallel View Query, 통계 분석을 거쳐 최종 답변으로 연결되는 구조</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef5ff" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b8c" />
    </marker>
    <style>
      .title { font: 700 28px 'Malgun Gothic', 'Segoe UI', sans-serif; fill: #162033; }
      .subtitle { font: 400 14px 'Malgun Gothic', 'Segoe UI', sans-serif; fill: #55637d; }
      .stage { fill: #ffffff; stroke: #d7e0f0; stroke-width: 2; rx: 22; }
      .chip { fill: #edf8f2; stroke: #aad7bc; stroke-width: 1.5; rx: 16; }
      .chip-blue { fill: #eaf1ff; stroke: #b9c9ea; }
      .chip-warm { fill: #fff6ea; stroke: #e8c78d; }
      .label { font: 700 16px 'Malgun Gothic', 'Segoe UI', sans-serif; fill: #1f2b42; }
      .small { font: 400 13px 'Malgun Gothic', 'Segoe UI', sans-serif; fill: #52627e; }
      .arrow { stroke: #5b6b8c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line { stroke: #8ea0bf; stroke-width: 2; fill: none; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <text x="56" y="56" class="title">AI 챗봇 구조</text>
  <text x="56" y="84" class="subtitle">질문 분류, RAG 조회, 병렬 View Query, 통계 분석을 거쳐 최종 응답을 구성하는 처리 흐름</text>

  <rect x="48" y="130" width="1104" height="542" class="stage" />

  <rect x="92" y="190" width="160" height="72" class="chip chip-blue" />
  <text x="139" y="232" class="label">사용자 질문</text>

  <rect x="316" y="190" width="178" height="72" class="chip chip-blue" />
  <text x="350" y="220" class="label">Query Router</text>
  <text x="366" y="244" class="small">질문 유형 분류</text>

  <rect x="560" y="190" width="188" height="72" class="chip chip-warm" />
  <text x="594" y="220" class="label">LLM Analysis</text>
  <text x="608" y="244" class="small">필요한 View 선택</text>

  <rect x="814" y="160" width="242" height="82" class="chip" />
  <text x="884" y="194" class="label">Supabase</text>
  <text x="840" y="220" class="small">스키마 조회 · AI Views 최대 7개</text>

  <rect x="234" y="346" width="196" height="82" class="chip chip-blue" />
  <text x="294" y="380" class="label">RAG 검색</text>
  <text x="262" y="406" class="small">관련 컨텍스트 / 기록 조회</text>

  <rect x="500" y="334" width="308" height="108" class="chip chip-warm" />
  <text x="564" y="370" class="label">Parallel View Query</text>
  <text x="548" y="396" class="small">선택된 View 최대 3개를 asyncio.gather()로 동시 조회</text>

  <rect x="318" y="510" width="536" height="88" class="chip" />
  <text x="484" y="546" class="label">Python Statistical Analysis</text>
  <text x="416" y="572" class="small">상관계수 · Z-Score 이상치 탐지 · 자연어 응답 구성</text>

  <rect x="926" y="346" width="140" height="82" class="chip chip-blue" />
  <text x="965" y="380" class="label">Ollama</text>
  <text x="954" y="406" class="small">로컬 LLM 실행</text>

  <rect x="908" y="536" width="176" height="70" class="chip chip-warm" />
  <text x="948" y="578" class="label">최종 AI 답변</text>

  <path d="M 252 226 L 316 226" class="arrow" />
  <path d="M 494 226 L 560 226" class="arrow" />
  <path d="M 748 226 L 814 201" class="arrow" />
  <path d="M 654 262 L 654 334" class="arrow" />
  <path d="M 406 262 L 332 346" class="arrow" />
  <path d="M 430 387 L 500 387" class="arrow" />
  <path d="M 654 442 L 654 510" class="arrow" />
  <path d="M 808 387 L 926 387" class="arrow" />
  <path d="M 996 428 L 996 536" class="arrow" />
  <path d="M 854 554 L 908 571" class="arrow" />
  <path d="M 814 201 C 854 201, 854 201, 884 201" class="line" />
  <path d="M 996 346 C 996 278, 900 278, 748 226" class="line" />
</svg>
